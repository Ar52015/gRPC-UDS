repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml

  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker
        name: Lint Dockerfiles

  - repo: https://github.com/bufbuild/buf
    rev: v1.66.1
    hooks:
      - id: buf-lint

  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff Linter
        entry: uv run ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: Ruff Formatter
        entry: uv run ruff format
        language: system
        types: [python]
        require_serial: true

      - id: mypy
        name: MyPy Type Checker
        entry: uv run mypy .
        language: system
        types: [python]
        pass_filenames: false
